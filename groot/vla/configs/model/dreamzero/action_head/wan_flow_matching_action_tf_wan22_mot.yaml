# @package _global_
# Wan2.2-TI2V-5B DreamZero MoT WAM config.

defaults:
  - wan_flow_matching_action_tf_wan22

architecture: mot
mot_action_hidden_dim: 1024
mot_action_ffn_dim: 4096
# null means "use the same depth as the selected Wan video DiT" (30 for Wan2.2-TI2V-5B).
mot_action_num_layers: null
mot_action_num_heads: 8
mot_action_video_attention: first_frame
mot_action_video_ki: false
mot_inference_video_mode: auto
mot_decouple_video_action_noise: false
mot_video_noise_beta_alpha: 3.0
mot_video_noise_beta_beta: 1.0
mot_decoupled_inference_video_final_noise: 0.8
mot_decoupled_inference_video_refresh_steps: 8
