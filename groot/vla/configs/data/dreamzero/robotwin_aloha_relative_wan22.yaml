# @package _global_

defaults:
  - dreamzero/base_48_wan_fine_aug_relative
  - _self_

# RoboTwin is ALOHA-style bimanual data in LeRobot v3. After
# scripts/data/convert_robotwin_v3_to_dreamzero.py it presents the same
# modality keys as the existing ALOHA X5lite server/checkpoint path:
#   video.cam_high/cam_left/cam_right
#   state/action left_joint_pos, left_gripper_pos, right_joint_pos, right_gripper_pos

image_resolution_width: 320
image_resolution_height: 160

max_state_dim: 64
use_global_metadata: false
relative_action: true
relative_action_per_horizon: false
relative_action_keys:
  - left_joint_pos
  - left_gripper_pos
  - right_joint_pos
  - right_gripper_pos
max_chunk_size: 4
dataset_shard_sampling_rate: 0.1
dataset_shard_sampling_strategy: block
dataset_shard_sampling_block_size: 64
mixture_dataset_cls: groot.vla.data.dataset.lerobot_sharded.ShardedLeRobotMixtureDataset.from_mixture_spec
single_dataset_cls: groot.vla.data.dataset.lerobot_sharded.ShardedLeRobotSubLangSingleActionChunkDatasetDROID

robotwin_data_root: ???
episode_filter_path: null

train_dataset:
  _target_: ${mixture_dataset_cls}
  _convert_: object
  mixture_spec:
    - dataset_path:
        aloha_x5lite_bimanual:
          - ${robotwin_data_root}
      dataset_weight: 1.0
      distribute_weights: true

  dataset_class: ${single_dataset_cls}
  all_modality_configs: ${modality_configs}
  all_transforms: ${transforms}
  metadata_versions: ${metadata_versions}
  fps: ${fps}
  dataset_kwargs:
    video_backend: decord
    use_global_metadata: ${use_global_metadata}
    max_chunk_size: ${max_chunk_size}
    relative_action: ${relative_action}
    relative_action_keys: ${relative_action_keys}
    relative_action_per_horizon: ${relative_action_per_horizon}
    episode_filter_path: ${episode_filter_path}
  mixture_kwargs:
    training: true
    balance_dataset_weights: false
    seed: 42
    shard_sampling_rate: ${dataset_shard_sampling_rate}
    shard_sampling_strategy: ${dataset_shard_sampling_strategy}
    shard_sampling_block_size: ${dataset_shard_sampling_block_size}
